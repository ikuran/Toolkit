<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Spatial Toolkit XR</title>
<style>
#xr-root{position:fixed;inset:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;z-index:9999}
#xr-root *{box-sizing:border-box;margin:0;padding:0}
#xr-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0c;color:#d8d8d8;padding:20px;text-align:center;z-index:10}
#xr-overlay h1{font-size:20px;font-weight:500;margin-bottom:8px}
#xr-overlay p{font-size:13px;color:#555;max-width:360px;line-height:1.7;margin-bottom:4px}
.xbtn{padding:11px 26px;border-radius:6px;border:1px solid #2a2a36;background:#1a1a24;color:#c8c8c8;font-size:14px;cursor:pointer;font-family:inherit;margin:5px 4px}
.xbtn.p{background:#0F6E5615;border-color:#5DCAA5;color:#5DCAA5}
#xr-msg{margin-top:12px;font-size:11px;color:#444;min-height:18px;max-width:420px;line-height:1.6;text-align:center}
#xr-stats{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:none;gap:10px;background:#111114ee;border:1px solid #1e1e24;border-radius:6px;padding:6px 14px;z-index:20;pointer-events:none;flex-wrap:wrap}
.xst{display:flex;align-items:center;gap:5px;font-size:11px;color:#c8c8c8;white-space:nowrap}
.xsd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
#xr-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
#xr-float{position:absolute;bottom:14px;right:14px;z-index:20;display:none}
#xr-float button{padding:9px 18px;background:#0F6E5615;border:1px solid #5DCAA5;color:#5DCAA5;border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="xr-root">
  <canvas id="xr-canvas"></canvas>
  <div id="xr-overlay">
    <h1>Spatial Toolkit — Quest 3</h1>
    <p>You are the human agent. Boids orbit your position. Use hand tracking or controllers to interact with the floating panel.</p>
    <div style="margin:14px 0">
      <button class="xbtn p" id="xr-btn" onclick="xrEnter()">Enter XR — Quest 3</button>
      <button class="xbtn" onclick="xrDesktop()">Desktop Preview</button>
    </div>
    <div id="xr-msg">Loading…</div>
  </div>
  <div id="xr-stats">
    <div class="xst"><div class="xsd" style="background:#5DCAA5"></div>You: <span id="xs-pos">0,0,0</span></div>
    <div class="xst"><div class="xsd" style="background:#AFA9EC"></div>Boids: <span id="xs-b">6</span></div>
    <div class="xst"><div class="xsd" style="background:#EF9F27"></div>Field E: <span id="xs-e">0.00</span></div>
    <div class="xst"><div class="xsd" style="background:#85B7EB"></div>Stage: <span id="xs-stage">1</span></div>
    <div class="xst"><div class="xsd" style="background:#888"></div>FPS: <span id="xs-fps">90</span></div>
  </div>
  <div id="xr-float"><button onclick="xrEnter()">↗ Enter XR</button></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── globals ────────────────────────────────────────────────────────────────
var R,S,CAM,XRS=null;
var BG,FG,FORMG,PG,PM,PT,PC;
var BOIDS=[],CTRLS=[];
var KEYS={},MVX=0,MVY=0,DRAG=false,PMX=0,PMY=0;
var YAW=0,PITCH=0,GRAB=false,GRABCTRL=null,GRAB_HAND=false;
var FPS=90,LT=0,TICK=0,FTICK=0,_lt2=0;
var STAGE=1,FMODE='voronoi';
var PW=1400,PH=800,_SL=[],_TABS=[];
var _cursorX=0,_cursorY=0,_cursorFade=0;
var HANDS={left:null,right:null};
var HAND_MESHES={left:[],right:[]};
var PINCH={left:false,right:false};
var PINCH_PREV={left:false,right:false};
var JOINT_NAMES=['wrist','thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip','index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip','middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip','ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip','pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip'];

var P={
  boidN:6,neighR:4,coh:0.018,sep:1.8,ali:0.04,maxV:2.5,
  spinStr:8,spinR:5,spinDecay:2.5,chargeStr:6,chargeDecay:3.5,
  fieldOp:0.7,showField:true,
  caRes:24,caSteps:5,caBirth:3,caSurMin:2,caSurMax:4,caThresh:0.38,caZ:4.0,caMinH:0.3,caAgBoost:1.5,
  rheScale:1.0,rheDens:10,rheSteps:60,rheZ:2.0,
  rdDB:12,rdDA:2.2,rdIso:0.55,rdF:0.6,rdZ:2.5,rdRes:22
};

function cl(v,a,b){return Math.max(a,Math.min(b,v));}
function lr(a,b,t){return a+(b-a)*t;}

// ── boot ──────────────────────────────────────────────────────────────────
(function wait(){if(typeof THREE==='undefined'){setTimeout(wait,50);return;}xrBoot();})();

function xrBoot(){
  var canvas=document.getElementById('xr-canvas');
  var root=document.getElementById('xr-root');
  var W=root.offsetWidth||window.innerWidth,H=root.offsetHeight||window.innerHeight;
  R=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true});
  R.setPixelRatio(Math.min(window.devicePixelRatio,2));
  R.setSize(W,H);R.xr.enabled=true;R.setClearColor(0x000000,0);
  S=new THREE.Scene();S.fog=new THREE.FogExp2(0x050510,0.013);
  CAM=new THREE.PerspectiveCamera(75,W/H,0.01,500);CAM.position.set(0,1.6,2);
  S.add(new THREE.AmbientLight(0xffffff,0.55));
  var d1=new THREE.DirectionalLight(0xffffff,1.0);d1.position.set(5,10,5);S.add(d1);
  var d2=new THREE.DirectionalLight(0x5DCAA5,0.5);d2.position.set(-5,3,-5);S.add(d2);
  var d3=new THREE.DirectionalLight(0xF0997B,0.3);d3.position.set(5,-2,8);S.add(d3);
  var grid=new THREE.GridHelper(40,50,0x1a1a2e,0x111120);grid.position.y=-0.01;S.add(grid);
  var geo=new THREE.BufferGeometry();var pts=new Float32Array(3000);
  for(var i=0;i<1000;i++){pts[i*3]=(Math.random()-.5)*80;pts[i*3+1]=(Math.random()-.5)*30+10;pts[i*3+2]=(Math.random()-.5)*80;}
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  S.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0x334466,size:0.05,sizeAttenuation:true})));
  BG=new THREE.Group();S.add(BG);
  FG=new THREE.Group();S.add(FG);
  FORMG=new THREE.Group();S.add(FORMG);
  xrBuildBoids();xrBuildPanel();xrInitEvents();xrCheckSupport();
  document.getElementById('xr-msg').textContent='Ready. Open https://ikuran.github.io/Toolkit on Quest 3.';
}

// ── boids ─────────────────────────────────────────────────────────────────
function Boid(spin){
  var r=2+Math.random()*5,a=Math.random()*Math.PI*2;
  this.pos=new THREE.Vector3(Math.cos(a)*r,1.2+Math.random()*1.5,Math.sin(a)*r);
  var sp=0.3+Math.random()*.4,va=Math.random()*Math.PI*2;
  this.vel=new THREE.Vector3(Math.cos(va)*sp,0,Math.sin(va)*sp);
  this.spin=!!spin;this.trail=[];
  var col=spin?0xEF9F27:0xAFA9EC;
  var g=new THREE.ConeGeometry(0.065,0.24,6);g.rotateX(Math.PI/2);
  this.mesh=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.3}));
  BG.add(this.mesh);
  var tg=new THREE.BufferGeometry();var tp=new Float32Array(14*3);
  tg.setAttribute('position',new THREE.BufferAttribute(tp,3).setUsage(35048));
  this.tl=new THREE.Line(tg,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.18}));
  BG.add(this.tl);
}
Boid.prototype.update=function(pp,dt){
  var nr=P.neighR,mv=P.maxV*0.28;
  var cx=0,cy=0,cz=0,sx=0,sy=0,sz=0,ax=0,ay=0,az=0,n=0;
  var all=BOIDS.concat([{pos:pp,vel:new THREE.Vector3()}]);
  for(var i=0;i<all.length;i++){
    var a=all[i];if(a===this)continue;
    var d=this.pos.distanceTo(a.pos);
    if(d<nr&&d>0){cx+=a.pos.x;cy+=a.pos.y;cz+=a.pos.z;ax+=a.vel.x||0;ay+=a.vel.y||0;az+=a.vel.z||0;n++;
      if(d<0.8){sx-=(a.pos.x-this.pos.x)/d;sy-=(a.pos.y-this.pos.y)/d;sz-=(a.pos.z-this.pos.z)/d;}}
  }
  if(n>0){
    this.vel.x+=((cx/n)-this.pos.x)*P.coh*.5+sx*P.sep*.03+(ax/n-this.vel.x)*P.ali;
    this.vel.y+=((cy/n)-this.pos.y)*P.coh*.25+sy*P.sep*.02+(ay/n-this.vel.y)*P.ali*.5;
    this.vel.z+=((cz/n)-this.pos.z)*P.coh*.5+sz*P.sep*.03+(az/n-this.vel.z)*P.ali;
  }
  var dx=this.pos.x-pp.x,dz=this.pos.z-pp.z,dist=Math.sqrt(dx*dx+dz*dz)||.01;
  if(dist<P.spinR){var dc=Math.exp(-dist/P.spinDecay);this.vel.x+=(-dz/dist)*P.spinStr*dc*.04;this.vel.z+=(dx/dist)*P.spinStr*dc*.04;}
  this.vel.y+=(1.5-this.pos.y)*.005;
  var sp=this.vel.length()||.001;
  if(sp>mv)this.vel.multiplyScalar(mv/sp);if(sp<.05)this.vel.multiplyScalar(.05/sp);
  this.trail.push(this.pos.clone());if(this.trail.length>14)this.trail.shift();
  this.pos.addScaledVector(this.vel,dt*60);
  var B=11;
  if(this.pos.x<-B)this.vel.x+=.1;if(this.pos.x>B)this.vel.x-=.1;
  if(this.pos.z<-B)this.vel.z+=.1;if(this.pos.z>B)this.vel.z-=.1;
  if(this.pos.y<.3)this.vel.y+=.15;if(this.pos.y>4.5)this.vel.y-=.08;
  this.mesh.position.copy(this.pos);this.mesh.lookAt(this.pos.clone().add(this.vel));
  var tp=this.tl.geometry.attributes.position;
  for(var k=0;k<Math.min(this.trail.length,14);k++)tp.setXYZ(k,this.trail[k].x,this.trail[k].y,this.trail[k].z);
  tp.needsUpdate=true;this.tl.geometry.setDrawRange(0,this.trail.length);
};
function xrBuildBoids(){
  BG.clear();BOIDS=[];
  for(var i=0;i<P.boidN;i++)BOIDS.push(new Boid(i<2));
  var el=document.getElementById('xs-b');if(el)el.textContent=BOIDS.length;
}

// ── field ─────────────────────────────────────────────────────────────────
function rF(px,pz,pp){
  var cs=P.chargeStr,cd=P.chargeDecay,ss=P.spinStr,sr=P.spinR,sd=P.spinDecay;
  var fx=0,fz=0;
  for(var i=0;i<BOIDS.length;i++){
    var b=BOIDS[i],dx=px-b.pos.x,dz2=pz-b.pos.z,d=Math.sqrt(dx*dx+dz2*dz2)||.1;
    var m=cs/(1+Math.pow(d/cd,2));fx+=dx/d*m;fz+=dz2/d*m;
  }
  var dx2=px-pp.x,dz3=pz-pp.z,d2=Math.sqrt(dx2*dx2+dz3*dz3)||.1;
  var dc=Math.exp(-d2/sd);
  if(d2<sr){fx+=(-dz3/d2)*ss*dc;fz+=(dx2/d2)*ss*dc;}
  fx+=dx2/d2*cs*1.2/(1+Math.pow(d2/cd,2));fz+=dz3/d2*cs*1.2/(1+Math.pow(d2/cd,2));
  var m2=Math.sqrt(fx*fx+fz*fz)||.001;return{fx:fx/m2,fz:fz/m2,mag:m2};
}
function xrUpdateField(pp){
  while(FG.children.length)FG.remove(FG.children[0]);
  if(!P.showField)return;
  var nR=8,nS=55,sL=0.38;
  var srcs=BOIDS.concat([{pos:pp,spin:false,isP:true}]);
  for(var si=0;si<srcs.length;si++){
    var src=srcs[si];
    var col=src.spin?new THREE.Color(0xEF9F27):src.isP?new THREE.Color(0x5DCAA5):new THREE.Color(0xAFA9EC);
    for(var ri=0;ri<nR;ri++){
      var ang=ri/nR*Math.PI*2;
      var cx=src.pos.x+Math.cos(ang)*.45,cz2=src.pos.z+Math.sin(ang)*.45,cy=src.pos.y+(Math.random()-.5)*.25;
      var vA=[];
      for(var s=0;s<nS;s++){
        if(Math.abs(cx)>13||Math.abs(cz2)>13)break;
        var f=rF(cx,cz2,pp);vA.push(cx,cy,cz2);
        cx+=f.fx*sL;cz2+=f.fz*sL;cy+=(f.fx*cz2-f.fz*cx)*.009+Math.sin(s*.4)*f.mag*.005;cy=cl(cy,.1,4.5);
      }
      if(vA.length<9)continue;
      var gg=new THREE.BufferGeometry();gg.setAttribute('position',new THREE.Float32BufferAttribute(vA,3));
      var cols=new Float32Array(vA.length),np=vA.length/3;
      for(var pi=0;pi<np;pi++){var t=pi/np;var c2=col.clone().lerp(new THREE.Color(0x223366),t*.7);cols[pi*3]=c2.r;cols[pi*3+1]=c2.g;cols[pi*3+2]=c2.b;}
      gg.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));
      FG.add(new THREE.Line(gg,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:P.fieldOp*.65})));
    }
  }
}

// ── form ──────────────────────────────────────────────────────────────────
function buildForm(pp){
  while(FORMG.children.length)FORMG.remove(FORMG.children[0]);
  if(STAGE<3)return;
  if(FMODE==='voronoi')buildVoronoi(pp);
  else if(FMODE==='rheotomic')buildRheotomic(pp);
  else buildMetaball(pp);
}

function buildVoronoi(pp){
  var N2=P.caRes+2,gi2=function(i,j){return j*N2+i;};
  var ca=new Uint8Array(N2*N2),ca2=new Uint8Array(N2*N2),cellE=new Float32Array(N2*N2);
  var fMin=1e9,fMax=-1e9,fGrid=[];
  for(var jj=0;jj<=P.caRes;jj++)for(var ii=0;ii<=P.caRes;ii++){var ff=rF(ii/(P.caRes-1)*22-11,jj/(P.caRes-1)*22-11,pp);fGrid.push(ff);if(ff.mag<fMin)fMin=ff.mag;if(ff.mag>fMax)fMax=ff.mag;}
  var fRange=(fMax-fMin)||1;
  for(var j=1;j<=P.caRes;j++)for(var i=1;i<=P.caRes;i++){
    var px=(i-1)/(P.caRes-1)*22-11,pz=(j-1)/(P.caRes-1)*22-11;
    var fi=Math.min(j*(P.caRes+1)+i,fGrid.length-1);
    var fNorm=(fGrid[fi].mag-fMin)/fRange,agE=0;
    for(var bi=0;bi<BOIDS.length;bi++){agE+=Math.exp(-Math.hypot(BOIDS[bi].pos.x-px,BOIDS[bi].pos.z-pz)/2.2)*P.caAgBoost;}
    agE+=Math.exp(-Math.hypot(pp.x-px,pp.z-pz)/2.2)*P.caAgBoost;
    cellE[gi2(i,j)]=fNorm+agE*0.4;ca[gi2(i,j)]=cellE[gi2(i,j)]>P.caThresh?1:0;
  }
  var countN=function(arr,i,j){var n=0;for(var di=-1;di<=1;di++)for(var dj=-1;dj<=1;dj++){if(di===0&&dj===0)continue;var ni=i+di,nj=j+dj;if(ni>=1&&ni<=P.caRes&&nj>=1&&nj<=P.caRes)n+=arr[gi2(ni,nj)];}return n;};
  for(var step=0;step<P.caSteps;step++){
    for(var j2=1;j2<=P.caRes;j2++)for(var i2=1;i2<=P.caRes;i2++){
      var nb=countN(ca,i2,j2),alive=ca[gi2(i2,j2)]===1,bn=cellE[gi2(i2,j2)]>P.caThresh*1.3?Math.max(1,P.caBirth-1):P.caBirth;
      ca2[gi2(i2,j2)]=alive?(nb>=P.caSurMin&&nb<=P.caSurMax?1:0):(nb===bn?1:0);
    }
    var tmp=ca;ca=ca2;ca2=tmp;
  }
  var cs=16/P.caRes,sx=-8+cs*.5;
  for(var j3=1;j3<=P.caRes;j3++)for(var i3=1;i3<=P.caRes;i3++){
    if(!ca[gi2(i3,j3)])continue;
    var px3=sx+(i3-1)*cs,pz3=sx+(j3-1)*cs;
    var fv=cl((cellE[gi2(i3,j3)]-P.caThresh)/(1-P.caThresh),0,1);
    var h=Math.max(P.caMinH,fv*P.caZ);
    var geo=new THREE.BoxGeometry(cs*.88,h,cs*.88);
    var mesh=new THREE.Mesh(geo,new THREE.MeshPhongMaterial({color:new THREE.Color().setHSL(0.50-fv*0.22,0.70,0.48+fv*0.28),shininess:80,transparent:true,opacity:0.88}));
    mesh.position.set(px3,h*.5,pz3);FORMG.add(mesh);
  }
}

function buildRheotomic(pp){
  var scale=P.rheScale,nIso=P.rheDens,fz=P.rheZ,gridN=P.rheSteps;
  var vortices=BOIDS.concat([{pos:pp,vel:new THREE.Vector3(),isP:true}]).map(function(a){
    return{cx:(a.pos.x/11)*5*scale,cz:(a.pos.z/11)*5*scale,s:a.isP?1:(Math.atan2(a.vel.z||0,a.vel.x||0)>0?1:-1),w:1.0};
  });
  var evalC=function(px,pz){var phi=0,psi=0;for(var v=0;v<vortices.length;v++){var dx=px-vortices[v].cx,dz=pz-vortices[v].cz,r2=dx*dx+dz*dz+0.015;phi+=vortices[v].s*.5*Math.log(r2);psi+=vortices[v].s*Math.atan2(dz,dx);}return{phi:phi,psi:psi};};
  var BOX=7*scale,STEP=BOX*2/gridN,G=gridN+1;
  var psiArr=new Float32Array(G*G),phiArr=new Float32Array(G*G),psiMin=1e9,psiMax=-1e9,phiMin=1e9,phiMax=-1e9;
  var gi=function(i,j){return j*G+i;};
  for(var j=0;j<=gridN;j++)for(var i=0;i<=gridN;i++){var c=evalC(-BOX+i*STEP,-BOX+j*STEP);psiArr[gi(i,j)]=c.psi;phiArr[gi(i,j)]=c.phi;if(c.psi<psiMin)psiMin=c.psi;if(c.psi>psiMax)psiMax=c.psi;if(c.phi<phiMin)phiMin=c.phi;if(c.phi>phiMax)phiMax=c.phi;}
  var MC2={1:[[3,0]],2:[[0,1]],3:[[3,1]],4:[[1,2]],5:[[3,2],[0,1]],6:[[0,2]],7:[[3,2]],8:[[2,3]],9:[[2,0]],10:[[0,3],[2,1]],11:[[2,1]],12:[[1,3]],13:[[1,0]],14:[[2,0]]};
  var lerpF=function(a,b,va,vb,iso){return a+(b-a)*cl((iso-va)/((vb-va)||.0001),0,1);};
  var buildSurf=function(grid,gMin,gMax,hue){
    var range=(gMax-gMin)||1,slabH=fz*1.8/Math.max(nIso,1);
    for(var iso=0;iso<nIso;iso++){
      var isoVal=gMin+range*(iso+.5)/nIso,pts=[];
      for(var jj=0;jj<gridN;jj++)for(var ii=0;ii<gridN;ii++){
        var v00=grid[gi(ii,jj)],v10=grid[gi(ii+1,jj)],v01=grid[gi(ii,jj+1)],v11=grid[gi(ii+1,jj+1)];
        var mc=0;if(v00>isoVal)mc|=1;if(v10>isoVal)mc|=2;if(v11>isoVal)mc|=4;if(v01>isoVal)mc|=8;
        if(mc===0||mc===15)continue;
        var x0=-BOX+ii*STEP,x1=x0+STEP,z0=-BOX+jj*STEP,z1=z0+STEP;
        var E=[[lerpF(x0,x1,v00,v10,isoVal),z0],[x1,lerpF(z0,z1,v10,v11,isoVal)],[lerpF(x0,x1,v01,v11,isoVal),z1],[x0,lerpF(z0,z1,v00,v01,isoVal)]];
        var lines=MC2[mc];if(!lines)continue;
        for(var li=0;li<lines.length;li++){var pa=E[lines[li][0]],pb=E[lines[li][1]];if(pa&&pb)pts.push({ax:pa[0],az:pa[1],bx:pb[0],bz:pb[1]});}
      }
      if(!pts.length)continue;
      var t2=iso/Math.max(nIso-1,1),yBase=-fz*.9+iso*slabH,vArr=[];
      for(var pi=0;pi<pts.length;pi++){
        var sg=pts[pi],ca2=evalC(sg.ax,sg.az),cb2=evalC(sg.bx,sg.bz);
        var ayT=yBase+((ca2.psi-gMin)/range*2-1)*fz*.65,byT=yBase+((cb2.psi-gMin)/range*2-1)*fz*.65;
        vArr.push(sg.ax,yBase,sg.az,sg.bx,yBase,sg.bz,sg.ax,ayT,sg.az,sg.bx,yBase,sg.bz,sg.bx,byT,sg.bz,sg.ax,ayT,sg.az);
      }
      if(vArr.length<9)continue;
      var geo2=new THREE.BufferGeometry();geo2.setAttribute('position',new THREE.Float32BufferAttribute(vArr,3));geo2.computeVertexNormals();
      FORMG.add(new THREE.Mesh(geo2,new THREE.MeshPhongMaterial({color:new THREE.Color().setHSL(hue-t2*.12,.68,.55+t2*.15),transparent:true,opacity:.75,side:THREE.DoubleSide})));
    }
  };
  buildSurf(psiArr,psiMin,psiMax,0.72);buildSurf(phiArr,phiMin,phiMax,0.48);
}

  // Right index ray
  var rayG=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-3)]);
  HAND_MESHES.rightRay=new THREE.Line(rayG,new THREE.LineBasicMaterial({color:0xF0997B,transparent:true,opacity:.5}));
  HAND_MESHES.rightRay.visible=false;S.add(HAND_MESHES.rightRay);
}

function xrUpdateHands(frame,refSpace){
  if(!frame||!refSpace)return;
  var sess=R.xr.getSession();if(!sess||!sess.inputSources)return;
  var sides=['left','right'];
  for(var si=0;si<sides.length;si++){
    var side=sides[si],src=null;
    for(var ss=0;ss<sess.inputSources.length;ss++){if(sess.inputSources[ss].handedness===side&&sess.inputSources[ss].hand){src=sess.inputSources[ss];break;}}
    var meshes=HAND_MESHES[side];
    if(!src||!src.hand){for(var mi=0;mi<meshes.length;mi++)meshes[mi].visible=false;if(side==='right'&&HAND_MESHES.rightRay)HAND_MESHES.rightRay.visible=false;HANDS[side]=null;continue;}
    HANDS[side]=src.hand;
    var jointData={};
    for(var ji=0;ji<JOINT_NAMES.length;ji++){
      var jnt=src.hand.get(JOINT_NAMES[ji]);if(!jnt)continue;
      var pose=frame.getJointPose(jnt,refSpace);if(!pose)continue;
      var p=pose.transform.position;
      meshes[ji].position.set(p.x,p.y,p.z);meshes[ji].visible=true;
      jointData[JOINT_NAMES[ji]]={x:p.x,y:p.y,z:p.z};
    }
    var iTip=jointData['index-finger-tip'],tTip=jointData['thumb-tip'];
    PINCH_PREV[side]=PINCH[side];
    if(iTip&&tTip){
      var pd=Math.hypot(iTip.x-tTip.x,iTip.y-tTip.y,iTip.z-tTip.z);
      PINCH[side]=pd<0.025;
      var ring=HAND_MESHES[side+'Ring'];
      if(ring){ring.position.set((iTip.x+tTip.x)*.5,(iTip.y+tTip.y)*.5,(iTip.z+tTip.z)*.5);ring.material.opacity=PINCH[side]?.85:cl((0.025-pd)/0.025,0,1)*.35;ring.visible=true;}
    }
    if(side==='right'&&jointData['index-finger-tip']&&jointData['index-finger-phalanx-distal']){
      var tip=jointData['index-finger-tip'],prox=jointData['index-finger-phalanx-distal'];
      var dir=new THREE.Vector3(tip.x-prox.x,tip.y-prox.y,tip.z-prox.z).normalize();
      var tipPos=new THREE.Vector3(tip.x,tip.y,tip.z);
      if(HAND_MESHES.rightRay){HAND_MESHES.rightRay.position.copy(tipPos);HAND_MESHES.rightRay.lookAt(tipPos.clone().add(dir));HAND_MESHES.rightRay.visible=!PINCH.right;}
      var ray=new THREE.Raycaster();ray.set(tipPos,dir);
      var hits=ray.intersectObject(PM);
      if(hits.length&&hits[0].distance<1.5&&hits[0].uv){
        var px=hits[0].uv.x*PW,py=(1-hits[0].uv.y)*PH;
        _cursorX=px;_cursorY=py;_cursorFade=10;
        if(PINCH.right&&!PINCH_PREV.right)xrPanelTap(px,py);
      }
      if(PINCH.right&&!PINCH_PREV.right&&tipPos.distanceTo(PG.position)<1.2)GRAB_HAND=true;
      if(!PINCH.right)GRAB_HAND=false;
      if(GRAB_HAND){PG.position.copy(tipPos).add(new THREE.Vector3(0,.05,.1));PG.lookAt(CAM.position);PG.rotation.y+=Math.PI;}
    }
    if(side==='left'&&PINCH.left&&!PINCH_PREV.left&&HANDS.right)xrBuildBoids();
  }
}

function xrPanelGrab(){
  if(GRAB_HAND)return;
  if(!GRAB||!GRABCTRL)return;
  PG.position.copy(GRABCTRL.position).add(new THREE.Vector3(0,-.05,-.28).applyQuaternion(GRABCTRL.quaternion));
  PG.quaternion.copy(GRABCTRL.quaternion);
}

function ctrlRay(){
  if(!CTRLS[1]||HANDS.right)return;
  var ctrl=CTRLS[1],ray=new THREE.Raycaster();
  ray.set(ctrl.position,new THREE.Vector3(0,0,-1).applyQuaternion(ctrl.quaternion));
  var hits=ray.intersectObject(PM);
  if(hits.length&&hits[0].distance<3&&hits[0].uv)xrPanelTap(hits[0].uv.x*PW,(1-hits[0].uv.y)*PH);
}

function xrPanelTap(px,py){
  var now=Date.now();if(now-_lt2<130)return;_lt2=now;
  for(var ti=0;ti<_TABS.length;ti++){
    var tb=_TABS[ti];
    if(px>tb.x&&px<tb.x+tb.w&&py>tb.y&&py<tb.y+tb.h){
      if(tb.stage){STAGE=tb.stage;document.getElementById('xs-stage').textContent=STAGE;buildForm(CAM.position);}
      if(tb.fmode){FMODE=tb.fmode;buildForm(CAM.position);}
      xrDrawPanel();return;
    }
  }
  for(var i=0;i<_SL.length;i++){
    var sl=_SL[i];
    if(py>sl.y&&py<sl.y+24&&px>sl.x&&px<sl.x+sl.bw){
      P[sl.p]=sl.min+(sl.max-sl.min)*cl((px-sl.x)/sl.bw,0,1);
      if(sl.p==='boidN'){P.boidN=Math.round(P.boidN);xrBuildBoids();}
    }
  }
}

// ── events ────────────────────────────────────────────────────────────────
function xrInitEvents(){
  window.addEventListener('resize',function(){var root=document.getElementById('xr-root');var w=root.offsetWidth||window.innerWidth,h=root.offsetHeight||window.innerHeight;R.setSize(w,h);CAM.aspect=w/h;CAM.updateProjectionMatrix();});
  window.addEventListener('keydown',function(e){KEYS[e.key]=true;});
  window.addEventListener('keyup',function(e){KEYS[e.key]=false;});
  var c=document.getElementById('xr-canvas');
  c.addEventListener('mousedown',function(e){DRAG=true;PMX=e.clientX;PMY=e.clientY;});
  window.addEventListener('mouseup',function(){DRAG=false;});
  window.addEventListener('mousemove',function(e){if(!DRAG)return;MVX=(e.clientX-PMX)*.003;MVY=(e.clientY-PMY)*.003;PMX=e.clientX;PMY=e.clientY;});
  c.addEventListener('wheel',function(e){CAM.position.z=cl(CAM.position.z+e.deltaY*.01,-5,12);});
  c.addEventListener('click',function(e){
    if(XRS)return;
    var ray=new THREE.Raycaster(),ndc=new THREE.Vector2((e.clientX/window.innerWidth)*2-1,-(e.clientY/window.innerHeight)*2+1);
    ray.setFromCamera(ndc,CAM);
    var hits=ray.intersectObject(PM);
    if(hits.length&&hits[0].uv)xrPanelTap(hits[0].uv.x*PW,(1-hits[0].uv.y)*PH);
  });
}

// ── xr support & enter ────────────────────────────────────────────────────
function xrCheckSupport(){
  var msg=document.getElementById('xr-msg'),btn=document.getElementById('xr-btn');
  if(!navigator.xr){msg.textContent='WebXR not available.';if(btn)btn.disabled=true;return;}
  navigator.xr.isSessionSupported('immersive-ar').then(function(ok){
    if(ok)msg.textContent='Passthrough AR ready — Quest 3 detected!';
    else return navigator.xr.isSessionSupported('immersive-vr').then(function(ok2){
      msg.textContent=ok2?'VR mode supported.':'XR not supported.';if(!ok2&&btn)btn.disabled=true;
    });
  }).catch(function(e){msg.textContent='Check error: '+e.message;});
  document.getElementById('xr-float').style.display='block';
}

async function xrEnter(){
  if(!navigator.xr)return;
  var msg=document.getElementById('xr-msg');
  var log=function(t){msg.textContent=t;console.log('[XR]',t);};
  var arOk=false,vrOk=false;
  try{arOk=await navigator.xr.isSessionSupported('immersive-ar');}catch(e){log('AR check failed: '+e.message);return;}
  try{vrOk=await navigator.xr.isSessionSupported('immersive-vr');}catch(e){}
  log('AR:'+arOk+' VR:'+vrOk+' — requesting…');
  var modes=[];
  if(arOk){modes.push(['immersive-ar',{optionalFeatures:['local-floor','bounded-floor','hand-tracking']}]);modes.push(['immersive-ar',{optionalFeatures:['local','hand-tracking']}]);modes.push(['immersive-ar',{optionalFeatures:['local-floor']}]);modes.push(['immersive-ar',{}]);}
  if(vrOk){modes.push(['immersive-vr',{optionalFeatures:['local-floor','bounded-floor','hand-tracking']}]);modes.push(['immersive-vr',{optionalFeatures:['local','hand-tracking']}]);modes.push(['immersive-vr',{optionalFeatures:['local-floor']}]);modes.push(['immersive-vr',{}]);}
  if(!modes.length){log('No XR modes supported. Need HTTPS + direct page (no iframe).');return;}
  var session=null,lastErr='';
  for(var i=0;i<modes.length;i++){
    try{log('Trying '+modes[i][0]+'…');session=await navigator.xr.requestSession(modes[i][0],modes[i][1]);break;}
    catch(e){lastErr=e.message;console.warn('[XR]',modes[i][0],e.message);}
  }
  if(!session){log('Failed: '+lastErr);return;}
  XRS=session;
  var refType='local';
  try{if((session.enabledFeatures||[]).indexOf('local-floor')>-1)refType='local-floor';}catch(e){}
  R.xr.setReferenceSpaceType(refType);
  await R.xr.setSession(session);
  window._xrRefSpace=null;
  session.requestReferenceSpace(refType).then(function(rs){window._xrRefSpace=rs;}).catch(function(){session.requestReferenceSpace('local').then(function(rs){window._xrRefSpace=rs;});});
  xrBuildControllers();
  document.getElementById('xr-overlay').style.display='none';
  document.getElementById('xr-stats').style.display='flex';
  document.getElementById('xr-float').querySelector('button').textContent='Exit XR';
  session.addEventListener('end',function(){XRS=null;document.getElementById('xr-overlay').style.display='flex';document.getElementById('xr-stats').style.display='none';document.getElementById('xr-float').querySelector('button').textContent='↗ Enter XR';});
  R.setAnimationLoop(xrLoop);
}

function xrDesktop(){
  document.getElementById('xr-overlay').style.display='none';
  document.getElementById('xr-stats').style.display='flex';
  R.setAnimationLoop(xrDesktopLoop);
}

// ── input ─────────────────────────────────────────────────────────────────
function xrGamepad(){
  var sess=R.xr.getSession();if(!sess)return;
  for(var src of sess.inputSources){
    if(!src.gamepad)continue;
    var ax=src.gamepad.axes,bt=src.gamepad.buttons;
    if(src.handedness==='left'&&ax.length>=4){
      var fwd=new THREE.Vector3(0,0,-1).applyQuaternion(CAM.quaternion);fwd.y=0;fwd.normalize();
      var rgt=new THREE.Vector3(1,0,0).applyQuaternion(CAM.quaternion);rgt.y=0;rgt.normalize();
      CAM.position.addScaledVector(fwd,-ax[3]*.05);CAM.position.addScaledVector(rgt,ax[2]*.05);
    }
    if(src.handedness==='right'&&bt.length>4&&bt[4]&&bt[4].pressed){
      STAGE=STAGE%3+1;document.getElementById('xs-stage').textContent=STAGE;buildForm(CAM.position);xrDrawPanel();
    }
  }
}

function xrDesktopInput(dt){
  var sp=4*dt;
  var fwd=new THREE.Vector3(0,0,-1).applyQuaternion(CAM.quaternion);fwd.y=0;fwd.normalize();
  var rgt=new THREE.Vector3(1,0,0).applyQuaternion(CAM.quaternion);rgt.y=0;rgt.normalize();
  if(KEYS['w']||KEYS['W']||KEYS['ArrowUp'])CAM.position.addScaledVector(fwd,sp);
  if(KEYS['s']||KEYS['S']||KEYS['ArrowDown'])CAM.position.addScaledVector(fwd,-sp);
  if(KEYS['a']||KEYS['A']||KEYS['ArrowLeft'])CAM.position.addScaledVector(rgt,-sp);
  if(KEYS['d']||KEYS['D']||KEYS['ArrowRight'])CAM.position.addScaledVector(rgt,sp);
  if(KEYS[' '])CAM.position.y=cl(CAM.position.y+sp*.5,.5,5);
  if(KEYS['Shift'])CAM.position.y=cl(CAM.position.y-sp*.5,.5,5);
  if(DRAG){YAW-=MVX;PITCH=cl(PITCH-MVY,-1.2,1.2);}
  MVX*=.7;MVY*=.7;
  CAM.quaternion.setFromEuler(new THREE.Euler(PITCH,YAW,0,'YXZ'));
}

// ── core update & loops ───────────────────────────────────────────────────
function xrCoreUpdate(dt){
  var pp=CAM.position;
  for(var i=0;i<BOIDS.length;i++)BOIDS[i].update(pp,dt);
  TICK++;
  if(TICK%3===0)xrUpdateField(pp);
  xrPanelGrab();
  if(STAGE===3){FTICK++;if(FTICK%90===0)buildForm(pp);}
  if(TICK%5===0)xrDrawPanel();
  if(TICK%14===0){
    var e=0;for(var ii=0;ii<6;ii++)for(var jj=0;jj<6;jj++)e+=rF(-8+ii*3.2,-8+jj*3.2,pp).mag;
    var es=document.getElementById('xs-e');if(es)es.textContent=(e/36).toFixed(2);
    var fp=document.getElementById('xs-fps');if(fp)fp.textContent=FPS;
    var xp=document.getElementById('xs-pos');if(xp)xp.textContent=pp.x.toFixed(1)+','+pp.y.toFixed(1)+','+pp.z.toFixed(1);
  }
}

function xrDesktopLoop(t){
  var dt=Math.min((t-LT)/1000,.05);LT=t;
  FPS=Math.round(.9*FPS+.1*(1/Math.max(dt,.001)));
  xrDesktopInput(dt);xrCoreUpdate(dt);R.render(S,CAM);
}

function xrLoop(t,frame){
  var dt=Math.min((t-LT)/1000,.05);LT=t;
  FPS=Math.round(.9*FPS+.1*(1/Math.max(dt,.001)));
  xrGamepad();
  if(frame&&window._xrRefSpace)xrUpdateHands(frame,window._xrRefSpace);
  xrCoreUpdate(dt);R.render(S,CAM);
}
</script>
